<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <style>
.bg { fill: #0B1120; }
.text-primary { fill: #F8FAFC; font-family: system-ui, -apple-system, sans-serif; }
.text-secondary { fill: #94A3B8; font-family: system-ui, -apple-system, sans-serif; }
.text-accent { fill: #06B6D4; font-family: system-ui, -apple-system, sans-serif; }
.card-bg { fill: #1E293B; }
.card-border { stroke: #334155; stroke-width: 1; }
.chip-bg { fill: #1E293B; stroke: #334155; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1280" height="360" class="bg" />
  <text x="60" y="100" class="text-accent" font-size="14" font-weight="700" letter-spacing="2">SENIOR BACKEND / FULL-STACK ENGINEER</text>
  <text x="60" y="160" class="text-primary" font-size="52" font-weight="800" letter-spacing="-0.5">Mykhailo Yarytskyi</text>
  <text x="60" y="210" class="text-secondary" font-size="22" font-weight="400">Production-grade systems, integrations, async workflows,</text>
  <text x="60" y="244" class="text-secondary" font-size="22" font-weight="400">data services, and operational reliability.</text>
  <g transform="translate(60, 290)">
    <rect x="0" y="0" width="110" height="36" rx="18" class="chip-bg" />
    <circle cx="20" cy="18" r="5" fill="#3B82F6" />
    <text x="36" y="23" class="text-primary" font-size="14" font-weight="500">Backend</text>

    <rect x="126" y="0" width="134" height="36" rx="18" class="chip-bg" />
    <circle cx="146" cy="18" r="5" fill="#06B6D4" />
    <text x="162" y="23" class="text-primary" font-size="14" font-weight="500">Integrations</text>

    <rect x="276" y="0" width="94" height="36" rx="18" class="chip-bg" />
    <circle cx="296" cy="18" r="5" fill="#8B5CF6" />
    <text x="312" y="23" class="text-primary" font-size="14" font-weight="500">Async</text>

    <rect x="386" y="0" width="86" height="36" rx="18" class="chip-bg" />
    <circle cx="406" cy="18" r="5" fill="#F59E0B" />
    <text x="422" y="23" class="text-primary" font-size="14" font-weight="500">Data</text>

    <rect x="488" y="0" width="80" height="36" rx="18" class="chip-bg" />
    <circle cx="508" cy="18" r="5" fill="#10B981" />
    <text x="524" y="23" class="text-primary" font-size="14" font-weight="500">Ops</text>

    <rect x="584" y="0" width="110" height="36" rx="18" class="chip-bg" />
    <circle cx="604" cy="18" r="5" fill="#F97316" />
    <text x="620" y="23" class="text-primary" font-size="14" font-weight="500">Platform</text>
  </g>
  <g transform="translate(840, 60)">
    <rect width="380" height="240" rx="16" class="card-bg card-border" />

    <text x="30" y="45" class="text-secondary" font-size="14" font-weight="600" letter-spacing="1">SYSTEM SNAPSHOT</text>
    <line x1="30" y1="65" x2="350" y2="65" class="card-border" />

    <g transform="translate(30, 100)">
      <circle cx="6" cy="-4" r="6" fill="#3B82F6" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">APIs</text>
    </g>

    <g transform="translate(200, 100)">
      <circle cx="6" cy="-4" r="6" fill="#8B5CF6" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">Workflows</text>
    </g>

    <g transform="translate(30, 150)">
      <circle cx="6" cy="-4" r="6" fill="#F59E0B" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">Data</text>
    </g>

    <g transform="translate(200, 150)">
      <circle cx="6" cy="-4" r="6" fill="#10B981" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">Ops</text>
    </g>

    <g transform="translate(30, 200)">
      <circle cx="6" cy="-4" r="6" fill="#06B6D4" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">Platform</text>
    </g>

    <g transform="translate(200, 200)">
      <circle cx="6" cy="-4" r="6" fill="#F97316" />
      <text x="24" y="1" class="text-primary" font-size="16" font-weight="500">Delivery</text>
    </g>
